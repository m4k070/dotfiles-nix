# Hyprland Configuration
# Migrated from mango

# Autostart
exec-once = noctalia
exec-once = fcitx5 -d

# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 4
    col.active_border = 0xc9b890ff
    col.inactive_border = 0x444444ff
    layout = dwindle
}

# Decoration
decoration {
    rounding = 6
    drop_shadow = false
    blur {
        enabled = false
    }
    active_opacity = 1.0
    inactive_opacity = 1.0
}

# Animations
animations {
    enabled = true
    animation = window, 1, 400, default, slide
    animation = fade, 1, 400, default
    animation = workspaces, 1, 400, default
}

# Input
input {
    kb_options =
    repeat_rate = 25
    repeat_delay = 600
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap = true
    }
}

# Misc
misc {
    force_default_wallpaper = 0
}

# Binds
binds {
    workspace_back_and_forth = true
}

# Key Bindings
bind = SUPER, R, exec, hyprctl reload
bind = SUPER, T, exec, ghostty
bind = SUPER, D, exec, fuzzel
bind = SUPER ALT, L, exec, noctalia msg session lock
bind = SUPER, Q, killactive
bind = SUPER SHIFT, E, exit
bind = SUPER SHIFT, F, fullscreen
bind = SUPER, V, togglefloating
bind = SUPER SHIFT, V, workspaceopt, allfloat
bind = SUPER, Space, switchlayout, next
bind = SUPER, F, fullscreen, 0

# Focus movement
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

# Window exchange
bind = SUPER CTRL, left, movewindoworgroup, l
bind = SUPER CTRL, right, movewindoworgroup, r
bind = SUPER CTRL, up, movewindoworgroup, u
bind = SUPER CTRL, down, movewindoworgroup, d
bind = SUPER CTRL, H, movewindoworgroup, l
bind = SUPER CTRL, J, movewindoworgroup, d
bind = SUPER CTRL, K, movewindoworgroup, u
bind = SUPER CTRL, L, movewindoworgroup, r

# Monitor focus
bind = SUPER SHIFT, left, focusmonitor, l
bind = SUPER SHIFT, right, focusmonitor, r
bind = SUPER SHIFT, up, focusmonitor, u
bind = SUPER SHIFT, down, focusmonitor, d
bind = SUPER SHIFT, H, focusmonitor, l
bind = SUPER SHIFT, J, focusmonitor, d
bind = SUPER SHIFT, K, focusmonitor, u
bind = SUPER SHIFT, L, focusmonitor, r

# Move window to monitor
bind = SUPER SHIFT CTRL, left, movewindow, mon:l
bind = SUPER SHIFT CTRL, right, movewindow, mon:r
bind = SUPER SHIFT CTRL, up, movewindow, mon:u
bind = SUPER SHIFT CTRL, down, movewindow, mon:d
bind = SUPER SHIFT CTRL, H, movewindow, mon:l
bind = SUPER SHIFT CTRL, J, movewindow, mon:d
bind = SUPER SHIFT CTRL, K, movewindow, mon:u
bind = SUPER SHIFT CTRL, L, movewindow, mon:r

# Workspace navigation
bind = SUPER, u, workspace, e-1
bind = SUPER, i, workspace, e+1
bind = SUPER, Page_Up, workspace, e-1
bind = SUPER, Page_Down, workspace, e+1
bind = SUPER CTRL, u, movetoworkspace, e-1
bind = SUPER CTRL, i, movetoworkspace, e+1
bind = SUPER CTRL, Page_Up, movetoworkspace, e-1
bind = SUPER CTRL, Page_Down, movetoworkspace, e+1
bind = SUPER SHIFT, u, movetoworkspace, e-1
bind = SUPER SHIFT, i, movetoworkspace, e+1
bind = SUPER SHIFT, Page_Up, movetoworkspace, e-1
bind = SUPER SHIFT, Page_Down, movetoworkspace, e+1

# Direct workspace access
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER CTRL, 1, movetoworkspace, 1
bind = SUPER CTRL, 2, movetoworkspace, 2
bind = SUPER CTRL, 3, movetoworkspace, 3
bind = SUPER CTRL, 4, movetoworkspace, 4
bind = SUPER CTRL, 5, movetoworkspace, 5
bind = SUPER CTRL, 6, movetoworkspace, 6
bind = SUPER CTRL, 7, movetoworkspace, 7
bind = SUPER CTRL, 8, movetoworkspace, 8
bind = SUPER CTRL, 9, movetoworkspace, 9

# Resize
bind = SUPER, minus, resizeactive, -50 0
bind = SUPER, equal, resizeactive, 50 0
bind = SUPER SHIFT, minus, resizeactive, 0 -50
bind = SUPER SHIFT, equal, resizeactive, 0 50

# Screenshot
bind = , Print, exec, grimblast save output

# Media keys
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+ -l 1.0
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl --class=backlight set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl --class=backlight set 10%-

# Mouse bindings
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Scroll wheel workspace switching
bind = SUPER, mouse_up, workspace, e-1
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER CTRL, mouse_up, movetoworkspace, e-1
bind = SUPER CTRL, mouse_down, movetoworkspace, e+1

# Window rules
windowrulev2 = float, class:^(Bitwarden)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, title:^(ピクチャーインピクチャー)$
windowrulev2 = float, class:^(fcitx)$
